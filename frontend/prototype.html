<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bureaucracy OS — Governance Intelligence Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0e17;
    --bg-secondary: #111827;
    --bg-card: #1a2236;
    --bg-card-hover: #1f2a42;
    --border: #2a3654;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent-cyan: #22d3ee;
    --accent-green: #34d399;
    --accent-red: #f87171;
    --accent-amber: #fbbf24;
    --accent-purple: #a78bfa;
    --accent-blue: #60a5fa;
    --gradient-main: linear-gradient(135deg, #22d3ee 0%, #a78bfa 100%);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient glow background */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(34,211,238,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(167,139,250,0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; }

  /* Top Navigation */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(17,24,39,0.8);
    backdrop-filter: blur(20px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--gradient-main);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 16px;
    color: #0a0e17;
  }

  .logo-text {
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.5px;
  }

  .logo-text span { color: var(--accent-cyan); }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(34,211,238,0.1);
    border: 1px solid rgba(34,211,238,0.3);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent-cyan);
  }

  .live-dot {
    width: 8px;
    height: 8px;
    background: var(--accent-cyan);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .role-selector {
    display: flex;
    gap: 4px;
    background: var(--bg-card);
    border-radius: 10px;
    padding: 4px;
    border: 1px solid var(--border);
  }

  .role-btn {
    padding: 6px 16px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 500;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .role-btn.active {
    background: var(--gradient-main);
    color: #0a0e17;
    font-weight: 600;
  }

  .role-btn:hover:not(.active) { color: var(--text-primary); background: var(--bg-card-hover); }

  /* Main Layout */
  .main { padding: 24px 32px; max-width: 1440px; margin: 0 auto; }

  .dashboard-header {
    margin-bottom: 28px;
  }

  .dashboard-title {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }

  .dashboard-subtitle {
    color: var(--text-secondary);
    font-size: 14px;
  }

  /* KPI Cards Row */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .kpi-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    border-radius: 14px 14px 0 0;
  }

  .kpi-card:nth-child(1)::before { background: var(--accent-cyan); }
  .kpi-card:nth-child(2)::before { background: var(--accent-green); }
  .kpi-card:nth-child(3)::before { background: var(--accent-red); }
  .kpi-card:nth-child(4)::before { background: var(--accent-amber); }
  .kpi-card:nth-child(5)::before { background: var(--accent-purple); }

  .kpi-card:hover { border-color: rgba(34,211,238,0.3); transform: translateY(-2px); }

  .kpi-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .kpi-value {
    font-size: 32px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: -1px;
  }

  .kpi-change {
    font-size: 12px;
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .kpi-change.positive { color: var(--accent-green); }
  .kpi-change.negative { color: var(--accent-red); }

  /* Two-column layout */
  .content-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  .content-grid.triple {
    grid-template-columns: 2fr 1fr;
  }

  /* Panels */
  .panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .panel-header {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-title {
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-badge {
    background: rgba(248,113,113,0.15);
    color: var(--accent-red);
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
  }

  .panel-body { padding: 16px 20px; }

  /* Workflow Pipeline Tracker */
  .pipeline {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 20px 0;
    overflow-x: auto;
  }

  .pipeline-stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 120px;
    position: relative;
  }

  .stage-dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    z-index: 2;
    border: 3px solid;
  }

  .stage-dot.completed { background: var(--accent-green); border-color: var(--accent-green); color: #0a0e17; }
  .stage-dot.active { background: var(--accent-cyan); border-color: var(--accent-cyan); color: #0a0e17; animation: pulse 2s infinite; }
  .stage-dot.stuck { background: var(--accent-red); border-color: var(--accent-red); color: #fff; }
  .stage-dot.pending { background: transparent; border-color: var(--border); color: var(--text-muted); }

  .stage-label {
    margin-top: 10px;
    font-size: 11px;
    color: var(--text-secondary);
    text-align: center;
    max-width: 100px;
  }

  .stage-day {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 2px;
  }

  .stage-connector {
    width: 60px;
    height: 3px;
    background: var(--border);
    flex-shrink: 0;
    margin-top: -20px;
  }

  .stage-connector.completed { background: var(--accent-green); }
  .stage-connector.active { background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan)); }

  /* Bottleneck Cards */
  .bottleneck-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
    border-left: 4px solid var(--accent-red);
    transition: all 0.2s;
  }

  .bottleneck-card:hover { border-left-color: var(--accent-cyan); background: var(--bg-card-hover); }

  .bottleneck-dept {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent-amber);
    margin-bottom: 4px;
  }

  .bottleneck-cause {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 10px;
    line-height: 1.5;
  }

  .bottleneck-rec {
    background: rgba(34,211,238,0.08);
    border: 1px solid rgba(34,211,238,0.2);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12px;
    color: var(--accent-cyan);
    line-height: 1.5;
  }

  .bottleneck-rec::before {
    content: '🤖 AI Recommendation: ';
    font-weight: 600;
  }

  .bottleneck-meta {
    display: flex;
    gap: 16px;
    margin-top: 10px;
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .bottleneck-meta span { display: flex; align-items: center; gap: 4px; }

  /* Department Table */
  .dept-table {
    width: 100%;
    border-collapse: collapse;
  }

  .dept-table th {
    text-align: left;
    padding: 10px 12px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }

  .dept-table td {
    padding: 12px;
    font-size: 13px;
    border-bottom: 1px solid rgba(42,54,84,0.5);
    vertical-align: middle;
  }

  .dept-table tr:hover td { background: rgba(34,211,238,0.03); }

  .score-bar {
    height: 6px;
    background: var(--bg-secondary);
    border-radius: 3px;
    overflow: hidden;
    width: 80px;
    display: inline-block;
    vertical-align: middle;
    margin-right: 8px;
  }

  .score-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
  }

  .status-tag {
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    display: inline-block;
  }

  .status-tag.critical { background: rgba(248,113,113,0.15); color: var(--accent-red); }
  .status-tag.delayed { background: rgba(251,191,36,0.15); color: var(--accent-amber); }
  .status-tag.on_track { background: rgba(52,211,153,0.15); color: var(--accent-green); }
  .status-tag.stuck { background: rgba(248,113,113,0.2); color: var(--accent-red); }
  .status-tag.completed { background: rgba(52,211,153,0.1); color: var(--accent-green); }

  /* SLA Chart */
  .chart-container {
    padding: 16px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    height: 200px;
  }

  .chart-bar-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    justify-content: flex-end;
  }

  .chart-bar {
    width: 100%;
    max-width: 40px;
    border-radius: 6px 6px 0 0;
    transition: height 0.8s ease;
    position: relative;
    cursor: pointer;
  }

  .chart-bar:hover { opacity: 0.85; }

  .chart-bar-label {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 8px;
    text-align: center;
  }

  .chart-bar-value {
    font-size: 11px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-primary);
    margin-bottom: 4px;
    text-align: center;
  }

  /* Risk Donut */
  .donut-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 16px;
  }

  .donut-svg { width: 140px; height: 140px; }

  .donut-legend {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .legend-count {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    margin-left: auto;
    padding-left: 12px;
  }

  /* Alert List */
  .alert-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid rgba(42,54,84,0.5);
  }

  .alert-item:last-child { border-bottom: none; }

  .alert-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 16px;
  }

  .alert-icon.critical { background: rgba(248,113,113,0.15); }
  .alert-icon.warning { background: rgba(251,191,36,0.15); }

  .alert-title {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 2px;
  }

  .alert-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  .alert-time {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 4px;
  }

  /* Citizen Portal Styles */
  .citizen-track {
    max-width: 600px;
    margin: 0 auto;
  }

  .citizen-search {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }

  .citizen-input {
    flex: 1;
    padding: 12px 16px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    outline: none;
  }

  .citizen-input:focus { border-color: var(--accent-cyan); }

  .citizen-btn {
    padding: 12px 24px;
    background: var(--gradient-main);
    border: none;
    border-radius: 10px;
    color: #0a0e17;
    font-weight: 600;
    font-family: 'Outfit', sans-serif;
    cursor: pointer;
    font-size: 14px;
  }

  .timeline-vertical {
    position: relative;
    padding-left: 30px;
  }

  .timeline-vertical::before {
    content: '';
    position: absolute;
    left: 14px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--border);
  }

  .tl-item {
    position: relative;
    padding: 12px 0 24px 20px;
  }

  .tl-dot {
    position: absolute;
    left: -22px;
    top: 14px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 3px solid;
  }

  .tl-dot.done { background: var(--accent-green); border-color: var(--accent-green); }
  .tl-dot.current { background: var(--accent-cyan); border-color: var(--accent-cyan); animation: pulse 2s infinite; }
  .tl-dot.waiting { background: transparent; border-color: var(--text-muted); }

  .tl-stage { font-size: 14px; font-weight: 500; }
  .tl-date { font-size: 12px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
  .tl-status-text { font-size: 12px; margin-top: 4px; }

  /* Full width panel */
  .full-width { grid-column: 1 / -1; }

  /* Responsive */
  @media (max-width: 1024px) {
    .kpi-grid { grid-template-columns: repeat(3, 1fr); }
    .content-grid { grid-template-columns: 1fr; }
    .content-grid.triple { grid-template-columns: 1fr; }
  }

  @media (max-width: 640px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .main { padding: 16px; }
    .topbar { padding: 12px 16px; flex-wrap: wrap; gap: 12px; }
  }

  .fade-in {
    animation: fadeIn 0.5s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .tab-row {
    display: flex;
    gap: 4px;
    padding: 4px;
    background: var(--bg-secondary);
    border-radius: 10px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    width: fit-content;
  }

  .tab-btn {
    padding: 6px 16px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 500;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: var(--bg-card);
    color: var(--text-primary);
  }
</style>
</head>
<body>

<div class="app" id="app"></div>

<script>
// ============================================================
//  BUREAUCRACY OS — PROTOTYPE DASHBOARD
//  Simulated data + fully interactive UI
// ============================================================

const DEPARTMENTS = [
  "Public Works Dept", "Finance Dept", "Urban Development",
  "Revenue Dept", "Health Dept", "Education Dept",
  "Transport Dept", "Agriculture Dept", "IT Dept",
  "Home Affairs", "Environment Dept", "Water Resources"
];

const STAGES = {
  infrastructure: ["File Submission", "Technical Review", "Dept Head Approval", "Finance Review", "Legal Sign-off", "Final Approval"],
  grievance: ["Complaint Filed", "Initial Assessment", "Dept Routing", "Investigation", "Resolution Draft", "Closure"],
  permit: ["Application Received", "Doc Verification", "Site Inspection", "Committee Review", "Approval"]
};

const BOTTLENECK_CAUSES = [
  { cause: "Sequential multi-officer sign-off causing cascading delays", rec: "Parallelize verification — officers can review simultaneously since checks are independent", save: 11 },
  { cause: "Single-point-of-failure: one officer handles all approvals", rec: "Distribute workload across 2-3 officers with rotating assignment", save: 8 },
  { cause: "Missing documentation causes repeated back-and-forth", rec: "Implement pre-submission checklist with automated document validation", save: 14 },
  { cause: "Handoff gap: no clear ownership during department transfer", rec: "Assign transition officer role with 24-hour pickup SLA at handoff points", save: 6 },
  { cause: "Approval authority on leave with no designated alternate", rec: "Mandate delegation-of-authority protocol with automatic alternate routing", save: 9 },
];

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr) { return arr[rand(0, arr.length - 1)]; }

// Generate workflows
function generateWorkflows(n = 50) {
  const workflows = [];
  const types = Object.keys(STAGES);
  for (let i = 0; i < n; i++) {
    const type = pick(types);
    const stages = STAGES[type];
    const dept = pick(DEPARTMENTS);
    const curIdx = rand(0, stages.length - 1);
    const status = pick(["on_track", "delayed", "stuck", "completed", "critical"]);
    const sla = rand(15, 60);
    const elapsed = rand(1, 90);
    workflows.push({
      id: `WF-2024-${String(i + 1).padStart(4, '0')}`,
      fileNum: `DL-2024-${String(rand(1, 999)).padStart(3, '0')}`,
      title: `${type === 'infrastructure' ? 'Road Project' : type === 'grievance' ? 'Citizen Grievance' : 'Building Permit'} #${i + 1}`,
      type, dept, status,
      priority: pick(["low", "medium", "high", "critical"]),
      stages: stages.map((s, j) => ({ name: s, status: j < curIdx ? 'completed' : j === curIdx ? 'active' : 'pending', day: j * rand(2, 7) })),
      currentStage: stages[curIdx],
      curIdx, totalStages: stages.length,
      slaDays: sla, elapsed, slaRemaining: Math.max(0, sla - elapsed),
      tags: [pick(["urgent", "VIP", "RTI", "court-ordered", "PMO-flagged"])].filter(() => Math.random() > 0.5),
    });
  }
  return workflows;
}

const DATA = generateWorkflows(50);

// Stats
function getStats() {
  const t = DATA.length;
  const s = DATA.filter(w => w.status === 'stuck').length;
  const d = DATA.filter(w => w.status === 'delayed').length;
  const cr = DATA.filter(w => w.status === 'critical').length;
  const c = DATA.filter(w => w.status === 'completed').length;
  const o = DATA.filter(w => w.status === 'on_track').length;
  const breach = DATA.filter(w => w.slaRemaining === 0).length;
  return { total: t, onTrack: o, delayed: d, stuck: s, critical: cr, completed: c, breach, compliance: ((1 - breach / t) * 100).toFixed(1) };
}

function getDeptStats() {
  const map = {};
  DATA.forEach(w => {
    if (!map[w.dept]) map[w.dept] = { name: w.dept, total: 0, stuck: 0, delayed: 0, days: [] };
    map[w.dept].total++;
    map[w.dept].days.push(w.elapsed);
    if (w.status === 'stuck') map[w.dept].stuck++;
    if (w.status === 'delayed') map[w.dept].delayed++;
  });
  return Object.values(map).map(d => ({
    ...d,
    avgDays: (d.days.reduce((a, b) => a + b, 0) / d.days.length).toFixed(1),
    score: ((d.stuck + d.delayed) / d.total * 100).toFixed(1)
  })).sort((a, b) => b.score - a.score);
}

function getBottlenecks() {
  const stuck = DATA.filter(w => ['stuck', 'delayed', 'critical'].includes(w.status));
  const byDept = {};
  stuck.forEach(w => { if (!byDept[w.dept]) byDept[w.dept] = []; byDept[w.dept].push(w); });
  return Object.entries(byDept).map(([dept, wfs]) => {
    const tmpl = pick(BOTTLENECK_CAUSES);
    return {
      dept, stage: wfs[0].currentStage, files: wfs.length,
      avgDelay: (wfs.reduce((a, w) => a + w.elapsed, 0) / wfs.length).toFixed(1),
      ...tmpl, confidence: (70 + Math.random() * 25).toFixed(0),
      similar: rand(5, 30), severity: wfs.length >= 3 ? 'critical' : 'warning'
    };
  }).sort((a, b) => b.files - a.files);
}

function getRiskDist() {
  let cr = 0, hi = 0, md = 0, lo = 0;
  DATA.forEach(w => {
    const prog = w.curIdx / w.totalStages;
    const time = w.elapsed / w.slaDays;
    if (time > 0.8 && prog < 0.6) cr++;
    else if (time > 0.6 && prog < 0.5) hi++;
    else if (time > prog) md++;
    else lo++;
  });
  return { critical: cr, high: hi, medium: md, low: lo };
}

function renderPipeline() {
  const stages = [
    { name: "File Submission", day: 1, status: "completed" },
    { name: "Technical Review", day: 3, status: "completed" },
    { name: "Dept Head Approval", day: 7, status: "completed" },
    { name: "Finance Review", day: 14, status: "stuck" },
    { name: "Legal Sign-off", day: null, status: "pending" },
    { name: "Final Approval", day: null, status: "pending" },
  ];
  let html = '';
  stages.forEach((s, i) => {
    const icon = s.status === 'completed' ? '✓' : s.status === 'stuck' ? '!' : (i + 1);
    html += `<div class="pipeline-stage">
      <div class="stage-dot ${s.status}">${icon}</div>
      <div class="stage-label">${s.name}</div>
      <div class="stage-day">${s.day ? 'Day ' + s.day : 'Pending'}</div>
    </div>`;
    if (i < stages.length - 1) {
      const cClass = s.status === 'completed' && stages[i + 1].status !== 'pending' ? 'completed' : s.status === 'completed' ? 'active' : '';
      html += `<div class="stage-connector ${cClass}"></div>`;
    }
  });
  return html;
}

function renderDonut(risk) {
  const total = risk.critical + risk.high + risk.medium + risk.low;
  const r = 54, cx = 70, cy = 70, sw = 14;
  const circumference = 2 * Math.PI * r;
  const segments = [
    { val: risk.critical, color: '#f87171' },
    { val: risk.high, color: '#fbbf24' },
    { val: risk.medium, color: '#60a5fa' },
    { val: risk.low, color: '#34d399' },
  ];
  let offset = 0;
  let paths = '';
  segments.forEach(seg => {
    const pct = seg.val / total;
    const dash = pct * circumference;
    paths += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${seg.color}" stroke-width="${sw}"
      stroke-dasharray="${dash} ${circumference - dash}" stroke-dashoffset="${-offset}"
      transform="rotate(-90 ${cx} ${cy})" />`;
    offset += dash;
  });
  return `<svg class="donut-svg" viewBox="0 0 140 140">${paths}
    <text x="${cx}" y="${cy - 6}" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="800" font-family="JetBrains Mono">${total}</text>
    <text x="${cx}" y="${cy + 12}" text-anchor="middle" fill="#64748b" font-size="9" font-family="Outfit">files</text>
  </svg>`;
}
